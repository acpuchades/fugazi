name: Release

# Publishes on a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds multi-platform wheels + sdist, then publishes to PyPI (Trusted
# Publishing / OIDC, no token) and the core crate to crates.io (token secret).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (${{ matrix.platform.runner }} ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-22.04, target: x86_64, manylinux: auto }
          # aarch64 uses manylinux_2_28 (gcc 8.5+, kernel headers with
          # `AT_HWCAP2`, ARMv8.4-a with sha3 support, C11 `stdatomic.h`) so
          # `aws-lc-sys` — pulled in by reqwest 0.13 → rustls' aws-lc-rs
          # default provider — cross-compiles cleanly. Trade-off: the
          # aarch64 wheel now needs glibc ≥ 2.28 on the target host; the
          # x86_64 leg stays at manylinux2014 so the far more common
          # user-facing wheel keeps the older baseline.
          - { runner: ubuntu-22.04, target: aarch64, manylinux: "2_28" }
          # Both macOS arches build on the Apple-Silicon runner; the x86_64
          # wheel is cross-compiled. The Intel macos-13 runner is scarce and
          # being deprecated — it routinely queued 10+ min while this leg ran.
          - { runner: macos-14, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
          - { runner: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: ${{ matrix.platform.manylinux }}
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: python/dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: python/dist

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [wheels, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write # Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Gate on the builds so a broken wheel can't leave crates.io published
    # while PyPI is not (which is how v0.7.0 half-released).
    needs: [wheels, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # System libs for plotters' `ttf` feature — the `fugazi` binary target
      # (CLI) links them via font-kit → fontconfig + freetype during the
      # publish-time verification build.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libfreetype-dev
      # Skip when the version is already on crates.io, so re-running a tag
      # whose wheels failed (crates.io publishes are irrevocable) republishes
      # PyPI without failing this leg.
      - name: cargo publish
        run: |
          version=$(cargo pkgid -p fugazi | sed 's/.*[@#]//')
          # crates.io rejects requests without a User-Agent
          if curl -fsS -A "fugazi-release-ci (github.com/acpuchades/fugazi)" \
              "https://crates.io/api/v1/crates/fugazi/${version}" > /dev/null 2>&1; then
            echo "fugazi ${version} already on crates.io — skipping"
          else
            cargo publish -p fugazi
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
