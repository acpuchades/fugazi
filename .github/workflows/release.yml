name: Release

# Publishes on a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds multi-platform wheels + sdist, then publishes to PyPI (Trusted
# Publishing / OIDC, no token) and the core crate to crates.io (token secret).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (${{ matrix.platform.runner }} ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-22.04, target: x86_64, manylinux: auto }
          - { runner: ubuntu-22.04, target: aarch64, manylinux: auto }
          # Both macOS arches build on the Apple-Silicon runner; the x86_64
          # wheel is cross-compiled. The Intel macos-13 runner is scarce and
          # being deprecated — it routinely queued 10+ min while this leg ran.
          - { runner: macos-14, target: x86_64 }
          - { runner: macos-14, target: aarch64 }
          - { runner: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        # `ring` (reqwest → rustls) builds ARMv8 assembly whose headers demand
        # the ACLE `__ARM_ARCH` macro; the manylinux2014 cross gcc is too old
        # to predefine it, so define it ourselves. Target-scoped, so this is
        # inert on every other matrix leg.
        env:
          CFLAGS_aarch64_unknown_linux_gnu: -D__ARM_ARCH=8
        with:
          working-directory: python
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: ${{ matrix.platform.manylinux }}
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: python/dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: python/dist

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [wheels, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write # Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # System libs for plotters' `ttf` feature — the `fugazi` binary target
      # (CLI) links them via font-kit → fontconfig + freetype during the
      # publish-time verification build.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libfreetype-dev
      - name: cargo publish
        run: cargo publish -p fugazi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
